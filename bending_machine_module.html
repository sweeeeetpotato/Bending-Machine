<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./src/style/reset.css">
  <link rel="stylesheet" href="./src/style/bending_machine_module.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  밴딩 머신 콜라 선택 버튼
  <button type="button" class="btn-product">
    <img class="img-product" src="./src/images/Original_Cola.png" alt="">
    <strong class="txt-product_name">Original_Cola</strong>
    <span class="txt-product_price">1000원</span>
  </button>
  <button type="button" class="btn-product sold-out">
    <img class="img-product" src="./src/images/Violet_Cola.png" alt="">
    <strong class="txt-product_name">Violet_Cola</strong>
    <span class="txt-product_price">1000원</span>
  </button>
  <button type="button" class="btn-product">
    <img class="img-product" src="./src/images/Yellow_Cola.png" alt="">
    <strong class="txt-product_name">Yellow_Cola</strong>
    <span class="txt-product_price">1000원</span>
  </button>
  <button type="button" class="btn-product">
    <img class="img-product" src="./src/images/Cool_Cola.png" alt="">
    <strong class="txt-product_name">Cool_Cola</strong>
    <span class="txt-product_price">1000원</span>
  </button>
  <button type="button" class="btn-product">
    <img class="img-product" src="./src/images/Green_Cola.png" alt="">
    <strong class="txt-product_name">Green_Cola</strong>
    <span class="txt-product_price">1000원</span>
  </button>
  <button type="button" class="btn-product">
    <img class="img-product" src="./src/images/Orange_Cola.png" alt="">
    <strong class="txt-product_name">Orange_Cola</strong>
    <span class="txt-product_price">1000원</span>
  </button>

  선택된 콜라 리스트
  <ul class="list-selected_product">
    <li>
      <button type="button" class="btn-delete_product">
        <img class="img-product" src="./src/images/Original_Cola.png" alt="">
        <strong class="txt-product_name">Original_Cola</strong>
        <span class="txt-product_count">1</span>
      </button>
    </li>
    <li>
      <button type="button" class="btn-delete_product"> 
        <img class="img-product" src="./src/images/Violet_Cola.png" alt="">
        <strong class="txt-product_name">Violet_Cola</strong>
        <span class="txt-product_count">1</span>
      </button>
    </li>
    <li>
      <button type="button" class="btn-delete_product">
        <img class="img-product" src="./src/images/Yellow_Cola.png" alt="">
        <strong class="txt-product_name">Yellow_Cola</strong>
        <span class="txt-product_count">1</span>
      </button>
    </li>
    <li>
      <button type="button" class="btn-delete_product">
        <img class="img-product" src="./src/images/Cool_Cola.png" alt="">
        <strong class="txt-product_name">Cool_Cola</strong>
        <span class="txt-product_count">1</span>
      </button>
    </li>
    <li>
      <button type="button" class="btn-delete_product">
        <img class="img-product" src="./src/images/Green_Cola.png" alt="">
        <strong class="txt-product_name">Green_Cola</strong>
        <span class="txt-product_count">1</span>
      </button>    
    </li>
    <li>
      <button type="button" class="btn-delete_product">
        <img class="img-product" src="./src/images/Orange_Cola.png" alt="">
        <strong class="txt-product_name">Orange_Cola</strong>
        <span class="txt-product_count">1</span>
      </button>
    </li>
  </ul>
</body>
</html>
